# Terrer Lab Team Members

# Principal Investigator
- id: "Lee Seung-jae"
  name: "Lee Seung-jae"
  position: "Professor, Korea University of Technology and Education"
  bio: "Professor Seung-Jae Lee received his M.S. and Ph.D. in Architectural Engineering from the University of Tokyo, specializing in structural engineering. His research focuses on earthquake-resistant structures and AI-based structural design to enhance the safety and performance of buildings. He has actively contributed to academia and industry through award-winning research and practical applications in structural engineering."
